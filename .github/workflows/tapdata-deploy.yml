name: TapData Deploy

on:
  push:
    branches: [main]
    paths:
      - '*_tapdata_export/**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - lpt

jobs:
  deploy:
    # TODO: Replace {WORKER_REPO} with actual org/repo, e.g. your-org/tapdata-cicd-worker
    uses: "sam101010101010/cicd-worker/.github/workflows/tapdata-deploy.yml@main"
    with:
      project: ${{ github.event.repository.name }}
      target_env: ${{ inputs.target_env || '' }}
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.sha }}
      caller_event: ${{ github.event_name }}
      caller_ref: ${{ github.ref }}
      worker_repo: "sam101010101010/cicd-worker"
    secrets: inherit
