name: TapData Rollback

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - sit
          - lpt
          - aat
          - prod
      last_stable_tag:
        description: 'Tag to rollback to (required)'
        required: true
        type: string

jobs:
  rollback:
    # TODO: Replace {WORKER_REPO} with actual org/repo, e.g. your-org/tapdata-cicd-worker
    uses: "sam101010101010/cicd-worker/.github/workflows/tapdata-rollback.yml@main"
    with:
      project: ${{ github.event.repository.name }}
      target_env: ${{ inputs.target_env }}
      last_stable_tag: ${{ inputs.last_stable_tag }}
      caller_repo: ${{ github.repository }}
      worker_repo: "sam101010101010/cicd-worker"
    secrets: inherit
